name: Build and deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 16 * * *"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
      pages: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Check TypeScript
        run: npm run typecheck --if-present

      - name: Build static Pages artifact
        env:
          OLIVER_BIRTH_DATE: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && secrets.OLIVER_BIRTH_DATE || '' }}
          REQUIRE_OLIVER_AGE: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && 'true' || 'false' }}
        run: npm run build:pages

      - name: Verify static Pages artifact
        env:
          OLIVER_BIRTH_DATE: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && secrets.OLIVER_BIRTH_DATE || '' }}
          REQUIRE_OLIVER_AGE: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && 'true' || 'false' }}
        run: npm run verify:pages

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload approved static output
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
